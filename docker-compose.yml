name: guardian-lan

services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guardian_lan}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guardian_lan_local_2026}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-guardian_lan}"]
      interval: 10s
      timeout: 5s
      retries: 10

  control-plane:
    build:
      context: .
      dockerfile: services/control-plane/Dockerfile
    environment:
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:guardian_lan_local_2026@postgres:5432/guardian_lan?sslmode=disable}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      EXPECTED_DNS_RESOLVER: ${EXPECTED_DNS_RESOLVER:-adguardhome}
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    depends_on:
      - control-plane
    ports:
      - "${DASHBOARD_PORT:-4201}:80"

  discovery-collector:
    build:
      context: .
      dockerfile: collectors/Dockerfile
      args:
        BIN_NAME: discovery-collector
    environment:
      NATS_URL: nats://host.docker.internal:4222
      DISCOVERY_SOURCE: ${DISCOVERY_SOURCE:-live}
      DISCOVERY_FIXTURE: /fixtures/devices.json
      DISCOVERY_INTERVAL_SECS: 60
      DISCOVERY_MAX_HOSTS: ${DISCOVERY_MAX_HOSTS:-256}
      DISCOVERY_PING_ENABLED: ${DISCOVERY_PING_ENABLED:-true}
      DISCOVERY_FINGERPRINT_ENABLED: ${DISCOVERY_FINGERPRINT_ENABLED:-true}
      DISCOVERY_FINGERPRINT_TIMEOUT_MS: ${DISCOVERY_FINGERPRINT_TIMEOUT_MS:-180}
      DISCOVERY_VENDOR_DB: ${DISCOVERY_VENDOR_DB:-/usr/share/ieee-data/oui.txt}
    depends_on:
      nats:
        condition: service_healthy
    network_mode: host
    user: "0:0"
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./fixtures/discovery:/fixtures:ro
    cap_add:
      - NET_RAW
      - NET_ADMIN

  dns-collector:
    build:
      context: .
      dockerfile: collectors/Dockerfile
      args:
        BIN_NAME: dns-collector
    environment:
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      DNS_SOURCE: ${DNS_SOURCE:-disabled}
      DNS_FIXTURE: /fixtures/queries.json
      DNS_INTERVAL_SECS: 45
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - ./fixtures/dns:/fixtures:ro

  flow-collector:
    build:
      context: .
      dockerfile: collectors/Dockerfile
      args:
        BIN_NAME: flow-collector
    environment:
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      FLOW_SOURCE: ${FLOW_SOURCE:-disabled}
      FLOW_FIXTURE: /fixtures/events.json
      FLOW_INTERVAL_SECS: 90
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - ./fixtures/flows:/fixtures:ro

  adguardhome:
    image: adguard/adguardhome:latest
    profiles: ["tooling"]
    ports:
      - "3000:3000"
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - adguard-work:/opt/adguardhome/work
      - adguard-conf:/opt/adguardhome/conf

  ntopng:
    image: ntop/ntopng:stable
    profiles: ["tooling"]
    network_mode: host
    command: ["--community"]
    cap_add:
      - NET_ADMIN
      - NET_RAW

volumes:
  postgres-data:
  adguard-work:
  adguard-conf:
